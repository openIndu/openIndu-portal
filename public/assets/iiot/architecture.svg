<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrGray" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#94a3b8"/>
    </marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#22c55e"/>
    </marker>
    <marker id="arrPurple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#8b5cf6"/>
    </marker>
    <marker id="arrCyan" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#06b6d4"/>
    </marker>
    <marker id="arrPurpleDash" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#a78bfa"/>
    </marker>
    <marker id="arrBlueDash" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#60a5fa"/>
    </marker>
    <filter id="s" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.07"/>
    </filter>
    <filter id="sLg" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="960" height="640" rx="16" fill="#fff"/>
  <rect x="30" y="50" width="900" height="550" rx="16" fill="#fafbfc" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">openIndu 平台架构</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#94a3b8">Cloud-Edge Collaboration · 云边协同架构</text>

  <!-- Chain labels -->
  <text x="60" y="80" font-size="11" font-weight="700" fill="#8b5cf6">数据采集链路</text>
  <text x="780" y="80" font-size="11" font-weight="700" fill="#06b6d4">用户交互链路</text>

  <!-- ===== ROW 1: 设备层 PLC (left column, center x=270) ===== -->
  <rect x="180" y="90" width="180" height="46" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" filter="url(#s)"/>
  <text x="270" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">设备层 PLC</text>
  <text x="270" y="126" text-anchor="middle" font-size="10" fill="#94a3b8">西门子 / 三菱 / 汇川</text>

  <line x1="270" y1="136" x2="270" y2="160" stroke="#f97316" stroke-width="2" marker-end="url(#arrGray)"/>

  <!-- ===== ROW 2: 设备接入层 (left column, center x=270) ===== -->
  <rect x="180" y="160" width="180" height="48" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#s)"/>
  <text x="270" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">设备接入层</text>
  <text x="270" y="196" text-anchor="middle" font-size="10" fill="#64748b">openIndu Agent</text>

  <!-- Arrow: 设备接入层 -> Message (vertical, same column) -->
  <line x1="270" y1="208" x2="270" y2="236" stroke="#22c55e" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- ===== ROW 3: Message (LEFT side, same column as 数据采集层) ===== -->
  <rect x="100" y="236" width="340" height="60" rx="10" fill="#faf5ff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#s)"/>
  <text x="122" y="256" font-size="10" font-weight="600" fill="#64748b">Message</text>
  <rect x="120" y="262" width="95" height="26" rx="6" fill="#3b82f6" opacity="0.1"/>
  <text x="167" y="280" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Nginx</text>
  <rect x="225" y="262" width="95" height="26" rx="6" fill="#6366f1" opacity="0.1"/>
  <text x="272" y="280" text-anchor="middle" font-size="10" font-weight="600" fill="#3730a3">Kafka</text>
  <rect x="330" y="262" width="95" height="26" rx="6" fill="#06b6d4" opacity="0.1"/>
  <text x="377" y="280" text-anchor="middle" font-size="10" font-weight="600" fill="#155e75">MQTT</text>

  <!-- Arrow: Message -> 数据采集层 (vertical, same column) -->
  <line x1="270" y1="296" x2="270" y2="328" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrPurple)"/>

  <!-- ===== LEFT: 数据采集层 ===== -->
  <rect x="150" y="328" width="240" height="54" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#s)"/>
  <text x="270" y="350" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">数据采集层</text>
  <text x="270" y="368" text-anchor="middle" font-size="10" fill="#64748b">openIndu Collector</text>

  <!-- Arrow: 数据采集层 -> databases (vertical) -->
  <line x1="270" y1="382" x2="270" y2="520" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrPurpleDash)"/>
  <text x="250" y="460" text-anchor="middle" font-size="10" fill="#8b5cf6" font-weight="600">写入</text>

  <!-- Arrow: Backend -> 数据采集层 (command dispatch) -->
  <line x1="510" y1="336" x2="390" y2="355" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrGreen)"/>
  <text x="450" y="340" text-anchor="middle" font-size="9" fill="#10b981" font-weight="600">命令下发</text>

  <!-- ===== RIGHT: openIndu-Website (left half) + openIndu-App (right half) ===== -->
  <rect x="510" y="140" width="140" height="100" rx="10" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.5" filter="url(#s)"/>
  <text x="580" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">openIndu-Website</text>
  <text x="580" y="178" text-anchor="middle" font-size="9" fill="#64748b">Vue 3 · Element Plus</text>
  <rect x="520" y="186" width="56" height="22" rx="4" fill="#d5e8d4" stroke="#82b366" stroke-width="0.8"/>
  <text x="548" y="201" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">工艺管理</text>
  <rect x="582" y="186" width="56" height="22" rx="4" fill="#d5e8d4" stroke="#82b366" stroke-width="0.8"/>
  <text x="610" y="201" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">设备管理</text>
  <rect x="520" y="212" width="56" height="22" rx="4" fill="#d5e8d4" stroke="#82b366" stroke-width="0.8"/>
  <text x="548" y="227" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">数据大屏</text>
  <rect x="582" y="212" width="56" height="22" rx="4" fill="#fff2cc" stroke="#d6b656" stroke-width="0.8"/>
  <text x="610" y="227" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">用户管理</text>

  <!-- ===== openIndu-App (parallel to Website) ===== -->
  <rect x="670" y="140" width="140" height="100" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#s)"/>
  <text x="740" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">openIndu-App</text>
  <text x="740" y="178" text-anchor="middle" font-size="9" fill="#64748b">Flutter · 移动端</text>
  <rect x="680" y="186" width="56" height="22" rx="4" fill="#d5e8d4" stroke="#82b366" stroke-width="0.8"/>
  <text x="708" y="201" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">工艺管理</text>
  <rect x="742" y="186" width="56" height="22" rx="4" fill="#d5e8d4" stroke="#82b366" stroke-width="0.8"/>
  <text x="770" y="201" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">设备管理</text>
  <rect x="680" y="212" width="56" height="22" rx="4" fill="#d5e8d4" stroke="#82b366" stroke-width="0.8"/>
  <text x="708" y="227" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">数据大屏</text>
  <rect x="742" y="212" width="56" height="22" rx="4" fill="#fff2cc" stroke="#d6b656" stroke-width="0.8"/>
  <text x="770" y="227" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">用户管理</text>

  <!-- Arrows: Website + App -> Backend -->
  <line x1="580" y1="240" x2="580" y2="276" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arrCyan)"/>
  <line x1="740" y1="240" x2="740" y2="276" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrGreen)"/>

  <!-- ===== RIGHT: openIndu-Backend ===== -->
  <rect x="510" y="286" width="300" height="100" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#s)"/>
  <text x="660" y="308" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">openIndu-Backend</text>
  <text x="660" y="324" text-anchor="middle" font-size="10" fill="#64748b">Spring Boot · Java 21</text>
  <rect x="520" y="332" width="86" height="22" rx="4" fill="#d5e8d4" stroke="#82b366" stroke-width="0.8"/>
  <text x="563" y="347" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">工艺管理</text>
  <rect x="614" y="332" width="86" height="22" rx="4" fill="#fff2cc" stroke="#d6b656" stroke-width="0.8"/>
  <text x="657" y="347" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">用户管理</text>
  <rect x="708" y="332" width="86" height="22" rx="4" fill="#d5e8d4" stroke="#82b366" stroke-width="0.8"/>
  <text x="751" y="347" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">设备管理</text>
  <rect x="520" y="358" width="86" height="22" rx="4" fill="#d5e8d4" stroke="#82b366" stroke-width="0.8"/>
  <text x="563" y="373" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">产品管理</text>
  <rect x="614" y="358" width="86" height="22" rx="4" fill="#d5e8d4" stroke="#82b366" stroke-width="0.8"/>
  <text x="657" y="373" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">数据大屏</text>

  <!-- Arrow: Backend -> databases (vertical) -->
  <line x1="660" y1="386" x2="660" y2="520" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrBlueDash)"/>
  <text x="640" y="460" text-anchor="middle" font-size="10" fill="#3b82f6" font-weight="600">读写</text>

  <!-- ===== DATABASE LAYER ===== -->
  <rect x="100" y="520" width="760" height="80" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sLg)"/>
  <text x="480" y="546" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">持久层 · 数据存储</text>
  <rect x="120" y="558" width="200" height="34" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <rect x="120" y="558" width="4" height="34" rx="2" fill="#ef4444"/>
  <text x="140" y="580" font-size="12" font-weight="700" fill="#1e293b">TDengine</text>
  <rect x="380" y="558" width="200" height="34" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <rect x="380" y="558" width="4" height="34" rx="2" fill="#f97316"/>
  <text x="400" y="580" font-size="12" font-weight="700" fill="#1e293b">PostgreSQL</text>
  <rect x="640" y="558" width="200" height="34" rx="8" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <rect x="640" y="558" width="4" height="34" rx="2" fill="#eab308"/>
  <text x="660" y="580" font-size="12" font-weight="700" fill="#1e293b">Redis</text>

</svg>