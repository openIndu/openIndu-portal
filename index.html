    <!-- Baidu 站长平台 verification — replace the content with the token from

    <meta name="baidu-site-verification" content="REPLACE_WITH_BAIDU_TOKEN" />
    <!-- Baidu 主动推送 (自动推送) — pings push.zhanzhang.baidu.com with the
         current URL on every page load, accelerating indexation of new pages.
         Safe to ship even before site verification; Baidu just discards
         pushes for unverified sites. async so it never blocks rendering. -->
    <script async>
      (function () {
        var bp = document.createElement('script');
        var curProtocol = window.location.protocol.split(':')[0];
        bp.src = (curProtocol === 'https')
          ? 'https://zz.bdstatic.com/linksubmit/push.js'
          : 'http://push.zhanzhang.baidu.com/push.js';
        var s = document.getElementsByTagName('script')[0];
        s.parentNode.insertBefore(bp, s);
      })();
    </script>
